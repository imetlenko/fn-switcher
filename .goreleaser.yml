version: 2

builds:
  - id: fn-switcher
    main: .
    binary: fn-switcher
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.revision={{.Tag}}-{{.ShortCommit}}-{{.CommitDate}}

archives:
  - id: fn-switcher
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

brews:
  - repository:
      owner: imetlenko
      name: homebrew-apps
    directory: Formula
    homepage: https://github.com/imetlenko/fn-switcher
    description: Instantly switches keyboard layout when you press the Fn (Globe) key — without the annoying macOS popup.
    license: MIT
    service: |
      run [opt_bin/"fn-switcher"]
      keep_alive true
      log_path var/"log/fn-switcher.log"
      error_log_path var/"log/fn-switcher.error.log"
    test: |
      system "#{bin}/fn-switcher", "--version"
    install: |
      bin.install "fn-switcher"
    post_install: |
      system "/usr/bin/xattr", "-dr", "com.apple.quarantine", "#{bin}/fn-switcher"
    caveats: |
      fn-switcher requires Accessibility permissions:
        System Settings → Privacy & Security → Accessibility
        Add: #{opt_bin}/fn-switcher

      To start fn-switcher now and on login:
        brew services start fn-switcher

      To start now and on login:
        brew services start fn-switcher

      To specify layouts, create a config or use flags:
              fn-switcher -l1 com.apple.keylayout.ABC -l2 com.apple.keylayout.Russian
    skip_upload: auto
