version: 2

builds:
  - id: fn-switcher
    main: .
    binary: fn-switcher
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.revision={{.Tag}}-{{.ShortCommit}}-{{.CommitDate}}

archives:
  - id: fn-switcher
    builds:
      - fn-switcher
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

brews:
  - repository:
      owner: imetlenko
      name: homebrew-apps
    directory: Formula
    homepage: https://github.com/imetlenko/fn-switcher
    description: Instantly switches keyboard layout when you press the Fn (Globe) key — without the annoying macOS popup.
    license: MIT
    service: |
      run [opt_bin/"fn-switcher"]
      keep_alive true
      log_path var/"log/fn-switcher.log"
      error_log_path var/"log/fn-switcher.error.log"
    post_install: |
      ohai "To start fn-switcher now and on login:"
      ohai "  brew services start fn-switcher"
      ohai ""
      ohai "Make sure to grant Accessibility permissions in:"
      ohai "  System Settings → Privacy & Security → Accessibility"
